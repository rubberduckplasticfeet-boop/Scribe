<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .editor { resize: none; line-height: 1.8; font-size: 1.1rem; }
    .tab-active { background-color: rgb(31 41 55); border-bottom: 3px solid rgb(168 85 247); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 border-r border-gray-800 bg-gray-900 flex flex-col">
      <div class="p-4 border-b border-gray-800">
        <h1 class="text-2xl font-bold text-purple-400">Scribe</h1>
      </div>
      <div class="p-4">
        <button onclick="newStory()" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl flex items-center justify-center gap-2 font-medium">
          <i class="fas fa-plus"></i> New Story
        </button>
      </div>

      <!-- Folders Dropdown -->
      <div class="px-4 text-xs uppercase text-gray-500 mt-4 mb-2 flex justify-between items-center">
        <span>Folders</span>
        <button onclick="createNewFolder()" class="text-purple-400 hover:text-purple-300">+</button>
      </div>
      <div class="px-4 mb-3">
        <select id="folder-dropdown" onchange="filterByFolder(this.value)" class="w-full bg-gray-800 rounded-lg p-2 text-sm">
          <option value="">All Stories</option>
        </select>
      </div>

      <div class="px-4 text-xs uppercase text-gray-500 mt-2 mb-2">Stories</div>
      <div id="story-list" class="flex-1 overflow-auto px-2 space-y-1"></div>

      <div class="p-4 border-t border-gray-800 space-y-2">
        <button onclick="toggleBible()" class="w-full flex items-center gap-3 py-3 px-4 hover:bg-gray-800 rounded-xl">
          <i class="fas fa-book"></i> Story Bible
        </button>
        <button onclick="openSettings()" class="w-full flex items-center gap-3 py-3 px-4 hover:bg-gray-800 rounded-xl">
          <i class="fas fa-cog"></i> Settings
        </button>
        
        <!-- Transfer Features Added -->
        <button onclick="exportAllStories()" class="w-full flex items-center gap-3 py-3 px-4 hover:bg-gray-800 rounded-xl text-green-400">
          <i class="fas fa-download"></i> Export All Stories
        </button>
        <button onclick="document.getElementById('import-file').click()" class="w-full flex items-center gap-3 py-3 px-4 hover:bg-gray-800 rounded-xl text-blue-400">
          <i class="fas fa-upload"></i> Import Stories
        </button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importStories(event)">
      </div>
    </div>

    <!-- Main Editor -->
    <div class="flex-1 flex flex-col">
      <div class="border-b border-gray-800 p-4 flex items-center justify-between bg-gray-900">
        <input id="story-title" class="bg-transparent text-2xl font-semibold focus:outline-none w-96" onchange="updateTitle()">
        <div class="flex gap-3">
          <button onclick="exportStory('md')" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg">MD</button>
          <button onclick="exportStory('txt')" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg">TXT</button>
          <button onclick="showImportModal()" class="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg">Import</button>
        </div>
      </div>

      <div class="border-b border-gray-800 px-4 py-2 flex gap-2 overflow-x-auto bg-gray-900" id="chapter-tabs"></div>

      <div class="flex-1 relative">
        <textarea id="chapter-content" class="w-full h-full bg-gray-950 p-8 editor focus:outline-none" placeholder="Write your chapter here..."></textarea>
        <div id="word-count" class="absolute bottom-4 right-6 bg-gray-900 px-4 py-1 rounded-full text-sm text-gray-400"></div>
      </div>
    </div>

    <!-- AI Sidebar -->
    <div class="w-80 border-l border-gray-800 bg-gray-900 flex flex-col">
      <div class="p-4 border-b border-gray-800 font-medium">AI Writing Assistant</div>
      
      <div class="p-4 border-b border-gray-800">
        <label class="text-xs text-gray-500 block mb-1">AI Provider</label>
        <select id="ai-provider" onchange="switchProvider()" class="w-full bg-gray-800 rounded-lg p-2 mb-3 text-sm">
          <option value="gemini">Gemini 2.5 Flash</option>
          <option value="deepseek">DeepSeek Chat</option>
          <option value="groq">Groq (Llama)</option>
        </select>
        <input id="api-key" type="password" placeholder="API Key" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm">
      </div>

      <div class="p-4 border-b border-gray-800">
        <button onclick="continueWriting()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-medium mb-3">
          ▶️ Continue Writing
        </button>
        <button onclick="showRewriteOptions()" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl font-medium mb-3">
          ✨ Rewrite Selected Text
        </button>
      </div>

      <div class="p-4 border-b border-gray-800">
        <label class="text-xs text-gray-500 block mb-1">POV Character:</label>
        <select id="perspective" class="w-full bg-gray-800 rounded-lg p-2 text-sm"></select>
      </div>

      <div class="flex-1 p-4 overflow-auto text-sm" id="ai-response"></div>
      
      <div class="p-4 border-t border-gray-800">
        <textarea id="ai-prompt" rows="3" class="w-full bg-gray-800 rounded-xl p-3 focus:outline-none text-sm" placeholder="Custom request..."></textarea>
        <button onclick="callAI()" class="mt-3 w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl font-medium">Send to AI</button>
      </div>
    </div>
  </div>

  <!-- Rewrite Options -->
  <div id="rewrite-options" class="hidden fixed bottom-24 right-96 bg-gray-800 border border-gray-700 rounded-xl shadow-2xl p-2 z-50 w-56">
    <div class="flex flex-col py-1 text-sm">
      <button onclick="rewriteWithOption('Rephrase')" class="px-5 py-2.5 hover:bg-gray-700 rounded-lg text-left">Rephrase</button>
      <button onclick="rewriteWithOption('Shorter')" class="px-5 py-2.5 hover:bg-gray-700 rounded-lg text-left">Shorter</button>
      <button onclick="rewriteWithOption('More Descriptive')" class="px-5 py-2.5 hover:bg-gray-700 rounded-lg text-left">More Descriptive</button>
      <button onclick="rewriteWithOption('Show, not tell')" class="px-5 py-2.5 hover:bg-gray-700 rounded-lg text-left">Show, not tell</button>
      <button onclick="rewriteWithOption('More inner conflict')" class="px-5 py-2.5 hover:bg-gray-700 rounded-lg text-left">More inner conflict</button>
      <button onclick="rewriteWithOption('More intense')" class="px-5 py-2.5 hover:bg-gray-700 rounded-lg text-left">More intense</button>
    </div>
  </div>

  <!-- Story Bible Modal -->
  <div id="bible-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 w-[820px] max-h-[90vh] rounded-2xl p-6 overflow-auto">
      <h2 class="text-2xl font-bold mb-6">Story Bible</h2>
      <div class="mb-8">
        <div class="flex justify-between items-center mb-3">
          <h3 class="text-lg font-semibold flex items-center gap-2"><i class="fas fa-users"></i> Characters</h3>
          <button onclick="addCharacter()" class="text-purple-400 hover:text-purple-300 flex items-center gap-1 text-sm">
            <i class="fas fa-plus"></i> Add Character
          </button>
        </div>
        <div id="characters-list" class="space-y-4"></div>
      </div>
      <div class="mb-8">
        <div class="flex justify-between items-center mb-3">
          <h3 class="text-lg font-semibold flex items-center gap-2"><i class="fas fa-globe"></i> Worldbuilding</h3>
          <button onclick="addWorldElement()" class="text-purple-400 hover:text-purple-300 flex items-center gap-1 text-sm">
            <i class="fas fa-plus"></i> Add Element
          </button>
        </div>
        <div id="world-list" class="space-y-4"></div>
      </div>
      <div class="mb-8">
        <h3 class="text-lg font-semibold mb-3 flex items-center gap-2"><i class="fas fa-wand-magic-sparkles"></i> Magic System</h3>
        <textarea id="magic-system" class="w-full h-32 bg-gray-800 rounded-xl p-4"></textarea>
      </div>
      <div>
        <h3 class="text-lg font-semibold mb-3">Additional Notes</h3>
        <textarea id="bible-notes" class="w-full h-40 bg-gray-800 rounded-xl p-4"></textarea>
      </div>
      <div class="flex gap-3 mt-8 pt-4 border-t border-gray-700">
        <button onclick="saveBible()" class="flex-1 bg-purple-600 py-3 rounded-xl font-medium">Save Bible</button>
        <button onclick="closeBible()" class="flex-1 bg-gray-700 py-3 rounded-xl">Close</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 w-[500px] rounded-2xl p-6">
      <h2 class="text-xl font-bold mb-6">Settings</h2>
      <div class="space-y-6">
        <div>
          <label class="block text-sm text-gray-400 mb-2">Theme Color</label>
          <div class="flex gap-3">
            <button onclick="changeTheme('purple')" class="w-9 h-9 bg-purple-600 rounded-full ring-2 ring-offset-2 ring-offset-gray-900"></button>
            <button onclick="changeTheme('blue')" class="w-9 h-9 bg-blue-600 rounded-full ring-2 ring-offset-2 ring-offset-gray-900"></button>
            <button onclick="changeTheme('emerald')" class="w-9 h-9 bg-emerald-600 rounded-full ring-2 ring-offset-2 ring-offset-gray-900"></button>
            <button onclick="changeTheme('rose')" class="w-9 h-9 bg-rose-600 rounded-full ring-2 ring-offset-2 ring-offset-gray-900"></button>
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Font Family</label>
          <select id="font-family" onchange="applyFontSettings()" class="w-full bg-gray-800 rounded-lg p-3">
            <option value="Inter">Inter (default)</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier New</option>
            <option value="Arial">Arial</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Font Size</label>
          <input type="range" id="font-size" min="14" max="24" value="18" step="1" oninput="applyFontSettings()" class="w-full">
          <div id="font-size-value" class="text-center text-sm text-gray-400">18px</div>
        </div>
      </div>
      <button onclick="closeSettings()" class="mt-8 w-full bg-gray-700 hover:bg-gray-600 py-3 rounded-xl">Close Settings</button>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 w-[500px] rounded-2xl p-6">
      <h2 class="text-xl font-bold mb-4">Import from URL</h2>
      <input id="import-url" type="text" placeholder="https://" class="w-full bg-gray-800 rounded-lg p-4 mb-4">
      <div class="flex gap-3">
        <button onclick="importFromURL()" class="flex-1 bg-purple-600 py-3 rounded-xl">Import</button>
        <button onclick="closeImportModal()" class="flex-1 bg-gray-700 py-3 rounded-xl">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let stories = [];
    let currentStoryIndex = 0;
    let currentChapterIndex = 0;
    let lastSelection = null;
    let currentFolderFilter = "";

    // === MULTI-AI PROVIDERS ===
    const providers = {
      gemini: { name: "Gemini", url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" },
      deepseek: { name: "DeepSeek", url: "https://api.deepseek.com/chat/completions" },
      groq: { name: "Groq", url: "https://api.groq.com/openai/v1/chat/completions" }
    };

    function loadStories() {
      const saved = localStorage.getItem('scribeStories');
      if (saved) stories = JSON.parse(saved);
      else {
        stories = [{
          title: "The Shadow of Eldoria",
          bible: { characters: [], world: [], magic: "", notes: "" },
          chapters: [{ title: "Chapter 1", content: "It was a dark and stormy night..." }]
        }];
      }
      currentStoryIndex = 0;
      currentChapterIndex = 0;
      renderFolderDropdown();
      renderStoryList();
      loadCurrentStory();
      switchProvider();
    }

    function saveData() {
      localStorage.setItem('scribeStories', JSON.stringify(stories));
    }

    // === TRANSFER FUNCTIONS ===
    function exportAllStories() {
      const dataStr = JSON.stringify(stories, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Scribe_Backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      alert("✅ Backup downloaded! This includes all stories and Story Bibles.");
    }

    function importStories(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedStories = JSON.parse(e.target.result);
          if (confirm(`Import ${importedStories.length} stories?`)) {
            stories = stories.concat(importedStories);
            renderFolderDropdown();
            renderStoryList();
            saveData();
            alert("✅ Stories imported successfully!");
          }
        } catch(err) {
          alert("❌ Invalid backup file.");
        }
      };
      reader.readAsText(file);
    }

    function renderFolderDropdown() {
      const folders = new Set();
      stories.forEach(s => { if (s.folder) folders.add(s.folder); });
      const select = document.getElementById('folder-dropdown');
      select.innerHTML = `<option value="">All Stories</option>`;
      folders.forEach(folder => {
        const opt = document.createElement('option');
        opt.value = folder;
        opt.textContent = folder;
        if (folder === currentFolderFilter) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function createNewFolder() {
      const name = prompt("New folder name:");
      if (name && name.trim()) {
        alert(`Folder "${name}" created.`);
        renderFolderDropdown();
      }
    }

    function filterByFolder(folder) {
      currentFolderFilter = folder;
      renderStoryList();
    }

    function renderStoryList() {
      const container = document.getElementById('story-list');
      container.innerHTML = '';
      const filtered = currentFolderFilter ?
        stories.filter(s => s.folder === currentFolderFilter) : stories;
      filtered.forEach((story) => {
        const i = stories.indexOf(story);
        const div = document.createElement('div');
        div.className = `group p-3 mx-2 rounded-lg cursor-pointer flex justify-between items-center ${i === currentStoryIndex ? 'bg-purple-950 border-l-4 border-purple-500' : 'hover:bg-gray-800'}`;
        div.innerHTML = `
          <span onclick="switchStory(${i})" class="flex-1">${story.title}</span>
          <button onclick="event.stopImmediatePropagation(); renameStory(${i});" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-white mx-1">✏️</button>
          <button onclick="event.stopImmediatePropagation(); deleteStory(${i});" class="opacity-0 group-hover:opacity-100 text-red-400">🗑️</button>
        `;
        container.appendChild(div);
      });
    }

    function renameStory(i) {
      const newName = prompt("Rename story:", stories[i].title);
      if (newName && newName.trim() !== "") {
        stories[i].title = newName.trim();
        renderStoryList();
        saveData();
      }
    }

    function switchStory(i) {
      currentStoryIndex = i;
      currentChapterIndex = 0;
      renderStoryList();
      loadCurrentStory();
    }

    function deleteStory(i) {
      if (stories.length === 1) return alert("You must keep at least one story.");
      if (confirm(`Delete "${stories[i].title}"?`)) {
        stories.splice(i, 1);
        if (currentStoryIndex >= stories.length) currentStoryIndex = stories.length - 1;
        renderStoryList();
        loadCurrentStory();
        saveData();
      }
    }

    function newStory() {
      const folder = prompt("Folder for this story:") || "";
      stories.push({
        title: "Untitled Story " + (stories.length + 1),
        folder: folder.trim() || null,
        bible: { characters: [], world: [], magic: "", notes: "" },
        chapters: [{ title: "Chapter 1", content: "" }]
      });
      currentStoryIndex = stories.length - 1;
      currentChapterIndex = 0;
      renderFolderDropdown();
      renderStoryList();
      loadCurrentStory();
    }

    function loadCurrentStory() {
      const story = stories[currentStoryIndex];
      document.getElementById('story-title').value = story.title;
      renderChapterTabs();
      document.getElementById('chapter-content').value = story.chapters[currentChapterIndex]?.content || "";
      updateWordCount();
      updatePerspectiveSelect();
    }

    function renderChapterTabs() {
      const container = document.getElementById('chapter-tabs');
      container.innerHTML = '';
      const story = stories[currentStoryIndex];
      story.chapters.forEach((ch, i) => {
        const tab = document.createElement('div');
        tab.className = `px-6 py-2 rounded-t-lg whitespace-nowrap cursor-pointer flex items-center gap-2 ${i === currentChapterIndex ? 'tab-active' : 'hover:bg-gray-800'}`;
        tab.innerHTML = `
          <span onclick="switchChapter(${i})">${ch.title}</span>
          <button onclick="event.stopImmediatePropagation(); renameChapter(${i});" class="text-xs opacity-70">✏️</button>
          <button onclick="event.stopImmediatePropagation(); deleteChapter(${i});" class="text-xs text-red-400 opacity-70">🗑️</button>
        `;
        container.appendChild(tab);
      });
      const addBtn = document.createElement('button');
      addBtn.className = "px-4 py-2 text-purple-400 hover:bg-gray-800 rounded-t-lg";
      addBtn.innerHTML = '+ New Chapter';
      addBtn.onclick = () => {
        story.chapters.push({ title: `Chapter ${story.chapters.length + 1}`, content: "" });
        currentChapterIndex = story.chapters.length - 1;
        renderChapterTabs();
        loadCurrentStory();
      };
      container.appendChild(addBtn);
    }

    function switchChapter(i) {
      currentChapterIndex = i;
      renderChapterTabs();
      loadCurrentStory();
    }

    function renameChapter(i) {
      const newName = prompt("New chapter name:", stories[currentStoryIndex].chapters[i].title);
      if (newName && newName.trim() !== "") {
        stories[currentStoryIndex].chapters[i].title = newName.trim();
        renderChapterTabs();
        saveData();
      }
    }

    function deleteChapter(i) {
      if (stories[currentStoryIndex].chapters.length === 1) return alert("You must keep at least one chapter.");
      if (confirm("Delete this chapter?")) {
        stories[currentStoryIndex].chapters.splice(i, 1);
        if (currentChapterIndex >= stories[currentStoryIndex].chapters.length) currentChapterIndex = stories[currentStoryIndex].chapters.length - 1;
        renderChapterTabs();
        loadCurrentStory();
        saveData();
      }
    }

    function updateTitle() {
      stories[currentStoryIndex].title = document.getElementById('story-title').value;
      renderStoryList();
      saveData();
    }

    function updateWordCount() {
      const text = document.getElementById('chapter-content').value;
      const words = text.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('word-count').innerHTML = `${words} words`;
    }

    document.getElementById('chapter-content').addEventListener('input', () => {
      stories[currentStoryIndex].chapters[currentChapterIndex].content = document.getElementById('chapter-content').value;
      updateWordCount();
      saveData();
    });

    // === MULTI-AI SUPPORT ===
    function switchProvider() {
      const provider = document.getElementById('ai-provider').value;
      const savedKey = localStorage.getItem(`apiKey_${provider}`) || "";
      document.getElementById('api-key').value = savedKey;
    }

    async function callAI(isRewrite = false) {
      const prompt = document.getElementById('ai-prompt').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();
      const providerName = document.getElementById('ai-provider').value;

      if (!prompt || !apiKey) return alert("Please enter a prompt and API key");

      localStorage.setItem(`apiKey_${providerName}`, apiKey);

      const box = document.getElementById('ai-response');
      box.innerHTML = `<p class="text-purple-400">Thinking...</p>`;

      try {
        let requestBody = {};
        let url = "";

        if (providerName === "gemini") {
          const bible = stories[currentStoryIndex].bible || {};
          const bibleText = `Characters: ${bible.characters.map(c => c.name + ": " + (c.desc||'')).join('; ')}\nWorld: ${bible.world.map(w => w.name + ": " + (w.desc||'')).join('; ')}\nMagic: ${bible.magic||'None'}\nNotes: ${bible.notes||'None'}`;
          const fullPrompt = `You are a talented novelist.\n\nStory Bible:\n${bibleText}\n\n${isRewrite && lastSelection ? "Original text to rewrite:\n" + lastSelection.text + "\n\n" : ""}Current Chapter:\n${document.getElementById('chapter-content').value}\n\nRequest: ${prompt}\n\nRespond with only the rewritten text.`;
          url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          requestBody = { contents: [{ parts: [{ text: fullPrompt }] }] };
        } else {
          url = providers[providerName].url;
          requestBody = {
            model: providerName === "deepseek" ? "deepseek-chat" : "llama3-8b-8192",
            messages: [{ role: "user", content: prompt }]
          };
        }

        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestBody)
        });

        if (res.status === 429) {
          box.innerHTML = `<p class="text-yellow-400">Rate limit reached. Switch provider or wait.</p>`;
          return;
        }

        const data = await res.json();
        let aiText = providerName === "gemini" ? 
          data.candidates?.[0]?.content?.parts?.[0]?.text : 
          data.choices?.[0]?.message?.content || "No response.";

        box.innerHTML = `
          <pre class="whitespace-pre-wrap bg-gray-800 p-4 rounded-xl">${aiText}</pre>
          <div class="flex gap-3 mt-4">
            <button onclick="copyAIResponse(this)" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-sm">Copy</button>
            ${isRewrite ? `<button onclick="replaceSelection('${aiText.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')" class="flex-1 bg-purple-600 hover:bg-purple-700 py-2 rounded-lg text-sm">Replace Selected</button>` : ''}
          </div>`;
      } catch(e) {
        box.innerHTML = `<p class="text-red-400">Error: ${e.message}</p>`;
      }
    }

    function copyAIResponse(btn) {
      const text = btn.parentElement.previousElementSibling.textContent;
      navigator.clipboard.writeText(text);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 2000);
    }

    function replaceSelection(newText) {
      const textarea = document.getElementById('chapter-content');
      if (!lastSelection) return;
      const full = textarea.value;
      const updated = full.substring(0, lastSelection.start) + newText + full.substring(lastSelection.end);
      textarea.value = updated;
      stories[currentStoryIndex].chapters[currentChapterIndex].content = updated;
      saveData();
      updateWordCount();
      lastSelection = null;
      document.getElementById('ai-response').innerHTML += `<p class="text-green-400 mt-2">✓ Replaced successfully!</p>`;
    }

    function continueWriting() {
      document.getElementById('ai-prompt').value = "Continue writing the story naturally from where I left off. Maintain the same style and tone.";
      callAI();
    }

    function showRewriteOptions() {
      const menu = document.getElementById('rewrite-options');
      menu.classList.toggle('hidden');
    }

    function rewriteWithOption(option) {
      document.getElementById('rewrite-options').classList.add('hidden');
      document.getElementById('ai-prompt').value = option;
      rewriteSelected();
    }

    function rewriteSelected() {
      const textarea = document.getElementById('chapter-content');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const selectedText = textarea.value.substring(start, end).trim();
      if (!selectedText) return alert("Please highlight some text first!");
      lastSelection = { start, end, text: selectedText };
      callAI(true);
    }

    function updatePerspectiveSelect() {
      const select = document.getElementById('perspective');
      select.innerHTML = '<option value="">Neutral Narrator</option>';
      const chars = stories[currentStoryIndex].bible.characters || [];
      chars.forEach(char => {
        if (char.name) {
          const opt = document.createElement('option');
          opt.value = char.name;
          opt.textContent = char.name;
          select.appendChild(opt);
        }
      });
    }

    // Bible Functions
    function toggleBible() {
      document.getElementById('bible-modal').classList.remove('hidden');
      renderBible();
    }

    function renderBible() {
      let bible = stories[currentStoryIndex].bible;
      if (!bible) bible = stories[currentStoryIndex].bible = { characters: [], world: [], magic: "", notes: "" };
      document.getElementById('characters-list').innerHTML = bible.characters.map((char, i) => `
        <div class="bg-gray-800 rounded-xl p-4">
          <input value="${char.name || ''}" class="bg-transparent font-semibold w-full mb-2" onchange="updateCharacter(${i}, 'name', this.value)">
          <textarea class="w-full bg-gray-700 rounded-lg p-3 text-sm" onchange="updateCharacter(${i}, 'desc', this.value)">${char.desc || ''}</textarea>
        </div>`).join('');
      document.getElementById('world-list').innerHTML = bible.world.map((item, i) => `
        <div class="bg-gray-800 rounded-xl p-4">
          <input value="${item.name || ''}" class="bg-transparent font-semibold w-full mb-2" onchange="updateWorld(${i}, 'name', this.value)">
          <textarea class="w-full bg-gray-700 rounded-lg p-3 text-sm" onchange="updateWorld(${i}, 'desc', this.value)">${item.desc || ''}</textarea>
        </div>`).join('');
      document.getElementById('magic-system').value = bible.magic || "";
      document.getElementById('bible-notes').value = bible.notes || "";
    }

    function addCharacter() {
      stories[currentStoryIndex].bible.characters.push({ name: "New Character", desc: "" });
      renderBible();
    }

    function addWorldElement() {
      stories[currentStoryIndex].bible.world.push({ name: "New Element", desc: "" });
      renderBible();
    }

    function updateCharacter(i, field, value) {
      stories[currentStoryIndex].bible.characters[i][field] = value;
    }

    function updateWorld(i, field, value) {
      stories[currentStoryIndex].bible.world[i][field] = value;
    }

    function saveBible() {
      const bible = stories[currentStoryIndex].bible;
      bible.magic = document.getElementById('magic-system').value;
      bible.notes = document.getElementById('bible-notes').value;
      saveData();
      closeBible();
    }

    function closeBible() {
      document.getElementById('bible-modal').classList.add('hidden');
    }

    function openSettings() {
      document.getElementById('settings-modal').classList.remove('hidden');
    }

    function closeSettings() {
      document.getElementById('settings-modal').classList.add('hidden');
    }

    function changeTheme(color) {
      alert("Theme changed to " + color + " (visual update coming soon)");
      closeSettings();
    }

    function applyFontSettings() {
      const font = document.getElementById('font-family').value;
      const size = document.getElementById('font-size').value;
      const textarea = document.getElementById('chapter-content');
      textarea.style.fontFamily = font;
      textarea.style.fontSize = size + "px";
      document.getElementById('font-size-value').textContent = size + "px";
    }

    function exportStory(format) {
      const story = stories[currentStoryIndex];
      let content = format === 'md' ? `# ${story.title}\n\n` : `${story.title}\n\n`;
      story.chapters.forEach(ch => {
        content += format === 'md' ? `## ${ch.title}\n\n${ch.content}\n\n` : `${ch.title}\n${ch.content}\n\n`;
      });
      const blob = new Blob([content], { type: format === 'md' ? 'text/markdown' : 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${story.title.replace(/[^a-z0-9]/gi, '_')}.${format}`;
      a.click();
    }

    function showImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
    function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); }

    async function importFromURL() {
      const url = document.getElementById('import-url').value.trim();
      if (!url) return alert("Enter a URL");
      try {
        const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
        const data = await res.json();
        document.getElementById('chapter-content').value += "\n\n[Imported Content]\n" + (data.contents || "").substring(0, 2000);
        saveData();
        closeImportModal();
      } catch(e) { alert("Import failed"); }
    }

    window.onload = loadStories;
  </script>
</body>
</html>
